name: Oocana mount Image
# Builds the Oocana mount image dependency environment.
# This image currently installs runtime dependencies only and expects rootfs-related assets
# to be provided externally when used in a mounted setup.

on:
  pull_request:
    paths:
      - "dockerfiles/oocana-mount.dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/image-oocana.yml"
  push:
    tags:
      - 'oocana-mount**'
    branches:
      - main
    paths:
      - "dockerfiles/oocana-mount.dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/image-oocana.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: oocana-mount

jobs:
  build-oocana-mount:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/oomol/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},match=${{ env.IMAGE_NAME }}@(\d+\.\d+\.\d+)
          flavor: |
            latest=auto
          labels: |
            org.opencontainers.image.description=Dependency environment for the Oocana mount image workflow.
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/oocana-mount') }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: dockerfiles/oocana-mount.dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
