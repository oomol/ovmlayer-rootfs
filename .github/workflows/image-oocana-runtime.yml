name: Oocana Runtime Image
# Builds Oocana runtime container image with oocana CLI and ovmlayer.
# Includes the latest executor layer tarball in the image at /tmp/executor-layer.tar.
on:
  pull_request:
    paths:
      - "dockerfiles/oocana-runtime.dockerfile"
      - "package.json"
      - "package-lock.json"
      - "requirements.txt"
      - "scripts/entrypoint.sh"
      - ".github/workflows/image-oocana-runtime.yml"
  push:
    tags:
      - 'oocana-runtime**'
    branches:
      - main
    paths:
      - "dockerfiles/oocana-runtime.dockerfile"
      - "package.json"
      - "package-lock.json"
      - "requirements.txt"
      - "scripts/entrypoint.sh"
      - ".github/workflows/image-oocana-runtime.yml"
  workflow_dispatch:

jobs:
  build-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Resolve executor layer version
        id: executor-layer-version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          version="$(
            gh release list --repo oomol/ovmlayer-rootfs --exclude-drafts --exclude-pre-releases --limit 100 \
              | awk '{print $1}' \
              | grep '^executor-layer@' \
              | sort -V \
              | tail -n 1
          )"

          if [ -z "$version" ]; then
            echo "Failed to resolve latest executor layer release" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Prepare build context (arm64)
        id: build-context-arm64
        uses: ./.github/actions/build-context
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          architecture: arm64
          ovmlayer_app_id: ${{ vars.OOMOL_DOWNLOADER_APP_ID }}
          ovmlayer_app_private_key: ${{ secrets.OOMOL_DOWNLOADER_APP_PRIVATE_KEY }}
      - name: Download executor layer (arm64)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release download "${{ steps.executor-layer-version.outputs.version }}" \
            --repo oomol/ovmlayer-rootfs \
            --pattern "arm64-executor.tar" \
            --clobber \
            -O "${{ github.workspace }}/arm64/executor-layer.tar"
      - name: Prepare build context (amd64)
        id: build-context-amd64
        uses: ./.github/actions/build-context
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          architecture: amd64
          ovmlayer_app_id: ${{ vars.OOMOL_DOWNLOADER_APP_ID }}
          ovmlayer_app_private_key: ${{ secrets.OOMOL_DOWNLOADER_APP_PRIVATE_KEY }}
      - name: Download executor layer (amd64)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release download "${{ steps.executor-layer-version.outputs.version }}" \
            --repo oomol/ovmlayer-rootfs \
            --pattern "amd64-executor.tar" \
            --clobber \
            -O "${{ github.workspace }}/amd64/executor-layer.tar"
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/oomol/oocana-runtime
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},match=oocana-runtime@(\d+\.\d+\.\d+)
          flavor: |
            latest=auto
          labels: |
            org.opencontainers.image.description=A container for running Oocana directly in command line.
            io.oomol.oocana.version=${{ steps.build-context-amd64.outputs.oocana_version }}
            io.oomol.ovmlayer.version=${{ steps.build-context-amd64.outputs.ovmlayer_version }}
            io.oomol.rootfs.version=${{ steps.build-context-amd64.outputs.rootfs_version }}
            io.oomol.executor-layer.version=${{ steps.executor-layer-version.outputs.version }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/oocana-runtime') }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: dockerfiles/oocana-runtime.dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
